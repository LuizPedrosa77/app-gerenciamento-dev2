version: "3.8"

services:
  gustavo-pedrosa-fx:
    image: hubnexusai/gustavo-pedrosa-fx:latest
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.http.routers.gustavo-pedrosa-fx.rule=Host(`fx.hubnexusai.com`)
        - traefik.http.routers.gustavo-pedrosa-fx.entrypoints=websecure
        - traefik.http.services.gustavo-pedrosa-fx.loadbalancer.server.port=80
        - traefik.http.routers.gustavo-pedrosa-fx.service=gustavo-pedrosa-fx
        - traefik.http.routers.gustavo-pedrosa-fx.tls.certresolver=le

networks:
  traefik_public:
    external: true
    name: traefik_public
